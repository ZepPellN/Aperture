name: Deploy to Cloudflare Pages

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Aperture
        uses: actions/checkout@v4

      - name: Checkout private content
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.CONTENT_REPO }}
          token: ${{ secrets.CONTENT_PAT }}
          path: content

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build with private content
        env:
          WIKI_ROOT: ./content
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
          directory: dist/
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
